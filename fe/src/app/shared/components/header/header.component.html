<header class="app-header">
  <div class="header-inner">
    <!-- Left: Brand -->
    <div class="header-brand">
      <div class="brand-logo">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
        </svg>
      </div>
      <span class="brand-name">Fleet Management</span>
    </div>

    <!-- Right: User dropdown -->
    <div class="header-dropdown" style="position:relative;">
      <button
        id="user-menu-btn"
        class="user-btn"
        (click)="toggleDropdown()"
        [attr.aria-expanded]="isDropdownOpen()"
      >
        <!-- Avatar -->
        <div class="avatar-wrapper">
          <div class="avatar-glow"></div>
          <div class="avatar">{{ userInitial }}</div>
          @if (isActive) {
            <span class="online-dot"></span>
          }
        </div>

        <!-- Name & email (desktop) -->
        <div class="user-info">
          <p class="user-name">{{ displayName }}</p>
          <p class="user-email">{{ displayEmail }}</p>
        </div>

        <!-- Chevron -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="chevron"
          [class.chevron-open]="isDropdownOpen()"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
        </svg>
      </button>

      <!-- Dropdown menu -->
      @if (isDropdownOpen()) {
        <div class="dropdown-menu" id="user-dropdown">
          <!-- User info row -->
          <div class="dropdown-user-info">
            <div class="dropdown-avatar">{{ userInitial }}</div>
            <div>
              <p class="dropdown-name">{{ displayName }}</p>
              <p class="dropdown-email">{{ displayEmail }}</p>
            </div>
          </div>
          <div class="dropdown-divider"></div>

          <!-- Logout -->
          <button
            id="logout-btn"
            class="logout-btn"
            (click)="handleLogout()"
            [disabled]="isLoggingOut()"
          >
            <div class="logout-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
              </svg>
            </div>
            <div class="logout-text">
              <p>{{ isLoggingOut() ? 'Đang đăng xuất...' : 'Đăng xuất' }}</p>
              <p class="logout-sub">Thoát khỏi tài khoản</p>
            </div>
          </button>
        </div>
      }
    </div>
  </div>
</header>
